name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Check Drizzle migrations
        run: npm run db:check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  package:
    name: Package (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            command: npm run pack:linux
            artifact: release/*
          - os: windows-latest
            target: win
            command: npm run pack:win
            artifact: release/*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package
        run: ${{ matrix.command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ledgerforge-${{ matrix.target }}-${{ github.ref_name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
